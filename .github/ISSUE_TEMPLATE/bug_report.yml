name: Bug Report
description: Report a bug in PUnit
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: "What happened? What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code or commands to reproduce the issue
      placeholder: |
        1. Create a test file with ...
        2. Run `pike -M . run_tests.pike tests/...`
        3. Observe ...
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened (include error output if applicable)
      render: shell
    validations:
      required: true

  - type: input
    id: pike-version
    attributes:
      label: Pike Version
      description: Output of `pike --version`
      placeholder: "Pike v8.0.1116"
    validations:
      required: true

  - type: input
    id: punit-version
    attributes:
      label: PUnit Version
      description: Version from `.version` file or git ref
      placeholder: "v1.1.0 or main branch"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, configuration, or environment details
